name: Deploy to Cloudflare Workers

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - name: Build
        run: npx opennextjs-cloudflare build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}

      - name: Inject runtime vars into wrangler config
        run: |
          node -e "
            const fs = require('fs');
            let cfg = fs.readFileSync('wrangler.jsonc', 'utf8');
            // Remove JSON comments for parsing
            const clean = cfg.replace(/\/\/.*$/gm, '').replace(/\/\*[\s\S]*?\*\//g, '');
            const obj = JSON.parse(clean);
            Object.assign(obj.vars, {
              SUPABASE_SERVICE_ROLE_KEY: process.env.SUPABASE_SERVICE_ROLE_KEY,
              GAME_SUPABASE_SERVICE_ROLE_KEY: process.env.GAME_SUPABASE_SERVICE_ROLE_KEY,
              GATHERINGS_API_KEY: process.env.GATHERINGS_API_KEY,
              CRON_SECRET: process.env.CRON_SECRET,
            });
            fs.writeFileSync('wrangler.jsonc', JSON.stringify(obj, null, 2));
          "
        env:
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GAME_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.GAME_SUPABASE_SERVICE_ROLE_KEY }}
          GATHERINGS_API_KEY: ${{ secrets.GATHERINGS_API_KEY }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}

      - name: Deploy
        run: npx opennextjs-cloudflare deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
