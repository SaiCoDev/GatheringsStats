name: Deploy to Cloudflare Workers

on:
  workflow_dispatch: # Manual deploy only — auto-deploy breaks OpenNext secrets

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - name: Build and Deploy
        run: |
          node .github/inject-secrets.cjs
          npx opennextjs-cloudflare build
          npx opennextjs-cloudflare deploy
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GAME_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.GAME_SUPABASE_SERVICE_ROLE_KEY }}
          GATHERINGS_API_KEY: ${{ secrets.GATHERINGS_API_KEY }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
