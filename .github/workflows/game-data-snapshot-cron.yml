name: Game Data Snapshot Cron

on:
  schedule:
    # Every 1 minute (GitHub may run ~60-90s apart)
    - cron: "*/5 * * * *"
  workflow_dispatch: # Allow manual trigger

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - name: Capture game data snapshot
        run: |
          response=$(curl -s -w "\n%{http_code}" -X GET \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "https://gatherings-stats.saicogaming.workers.dev/api/game-data-snapshot")
          http_code=$(echo "$response" | tail -1)
          body=$(echo "$response" | head -n -1)
          echo "$body"
          if [ "$http_code" -ne 200 ]; then
            echo "Failed with status $http_code"
            exit 1
          fi
