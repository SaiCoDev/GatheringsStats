name = "gatherings-cron"
main = "index.js"
compatibility_date = "2024-01-01"

[triggers]
crons = ["* * * * *"]

[vars]
SITE_URL = "https://gatherings-stats.saicogaming.workers.dev"

# CRON_SECRET set via: npx wrangler secret put CRON_SECRET --config wrangler.toml

[[services]]
binding = "MAIN_SITE"
service = "gatherings-stats"
